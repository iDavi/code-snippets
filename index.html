<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labirinto Esotérico</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hud-shell">
      <h1>LABIRINTO ESOTÉRICO</h1>
      <p>Encontre a porta final no corredor psicodélico de flamingos.</p>
      <ul>
        <li>WASD / Setas: mover</li>
        <li>Mouse: olhar</li>
        <li>Shift: correr</li>
      </ul>
      <p id="status">Status: atravesse o ritual.</p>
    </main>
    <canvas id="game" width="960" height="540" aria-label="Cena do labirinto"></canvas>
    <script src="game.js" type="module"></script>
  </body>
</html>
